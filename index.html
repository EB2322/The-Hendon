<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hendon Pub - MENU</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f9f9f9; }
    #lang-switch img { cursor:pointer; width:25px; vertical-align:middle; }
    .menu-section { margin-bottom: 20px; }
    .menu-section h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
    .menu-item { margin:5px 0; display:flex; justify-content:space-between; }
    .menu-item span.name { font-weight:bold; }
    .menu-item span.desc { font-style:italic; margin-left:10px; color:#555; }
    .menu-item span.price { font-weight:bold; color:#1a73e8; }
  </style>
</head>
<body>

<div id="lang-switch" style="text-align:right; margin-bottom:20px;">
  <!-- Flamuri i Shqipërisë -->
  <img src="https://flagcdn.com/w20/al.png" id="btn-sq" title="Shqip">
  <!-- Flamuri i Amerikës -->
  <img src="https://flagcdn.com/w20/us.png" id="btn-en" title="English">
</div>

<h1 id="menu-title">Hendon Pub - MENU</h1>
<div id="menu-container"></div>

<script>
(function () {
  function buildHendonMenu() {
    const items = [];
    const add = (type, section, name_sq, name_en, price) => {
      items.push({ id:`m${items.length+1}`, type, name_sq, name_en, section, price });
    };

    // **Kafe / Drinks**
    add("drink", "COFFEE", "Kafe", "Coffee", "120 ALL");
    add("drink", "COFFEE", "Kafe e ftohte", "Iced Coffee", "150 ALL");
    add("drink", "COFFEE", "Cappuccino", "Cappuccino", "180 ALL");
    add("drink", "COFFEE", "Cokollate e ngrohte", "Hot Chocolate", "200 ALL");
    add("drink", "FRESH DRINKS", "Uje pa gaz", "Still Water", "150 ALL");
    add("drink", "FRESH DRINKS", "Coca Cola", "Coca Cola", "200 ALL");

    // **Food / Mëngjesi**
    add("food", "MENGJESI", "Omlete normale", "Omelette", "250 ALL");
    add("food", "MENGJESI", "French Toast", "French Toast", "300 ALL");

    // Shembull: Cocktails
    const ask = "Pyet kamarierin / Ask waiter";
    add("drink", "COCKTAILS TE SUGJERUARA", "Aperol Spritz", "Aperol Spritz", ask);
    add("drink", "COCKTAILS TE SUGJERUARA", "Mojito", "Mojito", ask);

    return items;
  }

  window.HENDON_MENU = buildHendonMenu();

  function renderMenu(lang) {
    const container = document.getElementById('menu-container');
    container.innerHTML = '';
    
    // Grupe sekcioni sipas 'section'
    const sections = {};
    window.HENDON_MENU.forEach(item => {
      if(!sections[item.section]) sections[item.section] = [];
      sections[item.section].push(item);
    });

    for (const sec in sections) {
      const divSec = document.createElement('div');
      divSec.className = 'menu-section';
      divSec.innerHTML = `<h2>${sec}</h2>`;
      sections[sec].forEach(item => {
        const divItem = document.createElement('div');
        divItem.className = 'menu-item';
        divItem.innerHTML = `
          <span class="name">${lang==='sq'? item.name_sq : item.name_en}</span>
          <span class="desc">${item.section}</span>
          <span class="price">${item.price}</span>
        `;
        divSec.appendChild(divItem);
      });
      container.appendChild(divSec);
    }
  }

  // Ndryshim gjuhësh
  document.getElementById('btn-sq').addEventListener('click', ()=>renderMenu('sq'));
  document.getElementById('btn-en').addEventListener('click', ()=>renderMenu('en'));

  // Shfaq si parazgjedhje Shqip
  renderMenu('sq');
})();
</script>

</body>
</html>
